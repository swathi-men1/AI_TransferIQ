<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransferIQ — AI Player Transfer Value Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070b12;
  --surface: #0d1520;
  --surface2: #131d2e;
  --border: rgba(56,139,253,0.15);
  --accent: #2f81f7;
  --accent2: #58a6ff;
  --gold: #f0b429;
  --green: #3fb950;
  --red: #f85149;
  --text: #e6edf3;
  --muted: #7d8590;
  --card-bg: #0d1520;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }

/* Background grid */
body::before {
  content:''; position:fixed; inset:0; z-index:0;
  background-image: linear-gradient(rgba(47,129,247,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(47,129,247,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
}

/* Header */
header {
  position:relative; z-index:10;
  padding: 32px 48px 24px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(47,129,247,0.06) 0%, transparent 100%);
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;
}
.logo { display:flex; align-items:center; gap:14px; }
.logo-icon {
  width:44px; height:44px; background:var(--accent); border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:#fff;
  box-shadow: 0 0 20px rgba(47,129,247,0.4);
}
.logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:26px; letter-spacing:-0.5px; }
.logo-text span { color:var(--accent2); }
.logo-sub { font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; margin-top:2px; }
.header-stats { display:flex; gap:32px; }
.hstat { text-align:right; }
.hstat-val { font-family:'Syne',sans-serif; font-weight:700; font-size:20px; color:var(--accent2); }
.hstat-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-top:2px; }

/* Hero search */
.hero {
  position:relative; z-index:5;
  padding: 48px 48px 32px;
  text-align:center;
}
.hero h1 {
  font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(28px,4vw,52px);
  line-height:1.1; letter-spacing:-1px; margin-bottom:16px;
}
.hero h1 .hl { color:var(--accent2); }
.hero p { color:var(--muted); font-size:16px; max-width:560px; margin:0 auto 32px; line-height:1.6; }
.search-wrap {
  display:flex; gap:12px; max-width:600px; margin:0 auto; position:relative;
}
.search-wrap input {
  flex:1; padding:14px 20px; background:var(--surface); border:1px solid var(--border);
  border-radius:10px; color:var(--text); font-size:15px; font-family:'DM Sans',sans-serif;
  outline:none; transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(47,129,247,0.12); }
.search-wrap input::placeholder { color:var(--muted); }
.btn {
  padding:14px 24px; background:var(--accent); border:none; border-radius:10px;
  color:#fff; font-size:14px; font-weight:500; font-family:'DM Sans',sans-serif;
  cursor:pointer; transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  white-space:nowrap;
}
.btn:hover { background:#388bfd; box-shadow:0 0 16px rgba(47,129,247,0.4); }
.btn:active { transform:scale(0.97); }
.btn.secondary { background:var(--surface); border:1px solid var(--border); }
.btn.secondary:hover { background:var(--surface2); box-shadow:none; }

/* Filters */
.filters {
  position:relative; z-index:5;
  padding:0 48px 24px;
  display:flex; gap:10px; flex-wrap:wrap; align-items:center;
}
.filter-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-right:4px; }
select {
  padding:8px 14px; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:13px; font-family:'DM Sans',sans-serif;
  outline:none; cursor:pointer;
}
select:focus { border-color:var(--accent); }

/* Sort tabs */
.sort-tabs { display:flex; gap:4px; background:var(--surface); padding:4px; border-radius:9px; border:1px solid var(--border); }
.sort-tab {
  padding:6px 14px; border:none; background:transparent; color:var(--muted);
  font-size:12px; font-family:'DM Sans',sans-serif; cursor:pointer; border-radius:6px;
  transition:all 0.15s;
}
.sort-tab.active { background:var(--accent); color:#fff; }
.sort-tab:hover:not(.active) { color:var(--text); }

/* Player card modal */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,0.7); backdrop-filter:blur(6px);
  align-items:center; justify-content:center; padding:24px;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  width:100%; max-width:560px; max-height:90vh; overflow-y:auto;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { transform:scale(0.95) translateY(10px); opacity:0; } to { transform:scale(1) translateY(0); opacity:1; } }
.modal-header {
  padding:24px 24px 0;
  display:flex; justify-content:space-between; align-items:flex-start;
}
.modal-close { background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer; line-height:1; padding:4px; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:20px 24px 28px; }
.modal-name { font-family:'Syne',sans-serif; font-weight:800; font-size:28px; margin-bottom:4px; }
.modal-meta { color:var(--muted); font-size:14px; margin-bottom:24px; }
.modal-value-section { background:var(--bg); border-radius:12px; padding:20px; margin-bottom:20px; text-align:center; }
.modal-pred-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:8px; }
.modal-pred-val { font-family:'Syne',sans-serif; font-weight:800; font-size:38px; color:var(--gold); letter-spacing:-1px; }
.modal-actual { font-size:13px; color:var(--muted); margin-top:6px; }
.modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.modal-stat { background:var(--bg); border-radius:10px; padding:14px 16px; }
.modal-stat-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:6px; }
.modal-stat-val { font-family:'Syne',sans-serif; font-weight:700; font-size:18px; }
.bar-section { margin-bottom:20px; }
.bar-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.bar-lbl { font-size:12px; color:var(--muted); width:120px; flex-shrink:0; }
.bar-track { flex:1; height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width 0.6s cubic-bezier(0.16,1,0.3,1); }
.bar-val { font-family:'DM Mono',monospace; font-size:12px; color:var(--text); width:32px; text-align:right; }

/* Grid layout */
.content { position:relative; z-index:5; padding:0 48px 48px; }
.results-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border);
}
.results-count { font-family:'DM Mono',monospace; font-size:13px; color:var(--muted); }
.results-count span { color:var(--accent2); font-weight:500; }

/* Player cards grid */
.player-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }

.player-card {
  background:var(--card-bg); border:1px solid var(--border); border-radius:12px;
  padding:18px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden;
}
.player-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0; transition:opacity 0.2s;
}
.player-card:hover { border-color:rgba(47,129,247,0.35); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.player-card:hover::before { opacity:1; }

.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.card-name { font-family:'Syne',sans-serif; font-weight:700; font-size:15px; line-height:1.3; }
.card-club { font-size:12px; color:var(--muted); margin-top:2px; }
.card-ova {
  background:var(--accent); color:#fff; border-radius:8px;
  font-family:'Syne',sans-serif; font-weight:800; font-size:18px;
  width:42px; height:42px; display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.card-value {
  font-family:'Syne',sans-serif; font-weight:800; font-size:20px; color:var(--gold);
  margin-bottom:10px; letter-spacing:-0.5px;
}
.card-value .currency { font-size:13px; font-weight:600; opacity:0.7; margin-right:2px; }
.card-tags { display:flex; gap:6px; flex-wrap:wrap; }
.tag {
  padding:3px 9px; border-radius:20px; font-size:11px; font-weight:500;
  font-family:'DM Mono',monospace; letter-spacing:0.2px;
}
.tag.pos-forward  { background:rgba(240,180,41,0.12); color:var(--gold); border:1px solid rgba(240,180,41,0.2); }
.tag.pos-midfielder { background:rgba(47,129,247,0.12); color:var(--accent2); border:1px solid rgba(47,129,247,0.2); }
.tag.pos-defender { background:rgba(63,185,80,0.12); color:var(--green); border:1px solid rgba(63,185,80,0.2); }
.tag.pos-goalkeeper { background:rgba(248,81,73,0.12); color:var(--red); border:1px solid rgba(248,81,73,0.2); }
.tag.pos-other { background:rgba(125,133,144,0.12); color:var(--muted); border:1px solid rgba(125,133,144,0.2); }
.tag.risk-none  { background:rgba(63,185,80,0.1); color:var(--green); border:1px solid rgba(63,185,80,0.15); }
.tag.risk-low   { background:rgba(88,166,255,0.1); color:var(--accent2); border:1px solid rgba(88,166,255,0.15); }
.tag.risk-medium { background:rgba(240,180,41,0.1); color:var(--gold); border:1px solid rgba(240,180,41,0.15); }
.tag.risk-high  { background:rgba(248,81,73,0.1); color:var(--red); border:1px solid rgba(248,81,73,0.15); }
.tag.stage { background:rgba(125,133,144,0.1); color:var(--muted); border:1px solid rgba(125,133,144,0.15); }
.tag.sentiment-positive { background:rgba(63,185,80,0.1); color:var(--green); border:1px solid rgba(63,185,80,0.15); }
.tag.sentiment-negative { background:rgba(248,81,73,0.1); color:var(--red); border:1px solid rgba(248,81,73,0.15); }
.tag.sentiment-neutral  { background:rgba(125,133,144,0.1); color:var(--muted); border:1px solid rgba(125,133,144,0.15); }

/* Pagination */
.pagination { display:flex; justify-content:center; align-items:center; gap:8px; margin-top:32px; }
.page-btn {
  padding:8px 16px; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:13px; cursor:pointer; transition:all 0.15s;
}
.page-btn:hover { border-color:var(--accent); color:var(--accent2); }
.page-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.page-btn:disabled { opacity:0.3; cursor:not-allowed; }
.page-info { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); }

/* No results */
.no-results { text-align:center; padding:80px 20px; color:var(--muted); }
.no-results h3 { font-family:'Syne',sans-serif; font-size:20px; margin-bottom:8px; color:var(--text); }

/* Responsive */
@media(max-width:768px) {
  header { padding:20px 20px 16px; }
  .hero { padding:32px 20px 20px; }
  .filters { padding:0 20px 16px; }
  .content { padding:0 20px 32px; }
  .header-stats { display:none; }
  .player-grid { grid-template-columns:1fr; }
}

/* Loading skeleton */
.skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:6px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>

<header>

  </div>
</div>

<div class="filters">

    <option value="goalkeeper">Goalkeeper</option>

    <option value="high">High</option>

  <select id="sentimentFilter" onchange="applyFilters()">

  <div style="margin-left:auto; display:flex; align-items:center; gap:10px;">

      <button class="sort-tab" onclick="setSort('age',this)">Age</button>
      <button class="sort-tab" onclick="setSort('performance_score',this)">Performance</button>
    </div>
  </div>
</div>

<div class="content">
  <div class="results-header">
    <div class="results-count">Showing <span id="showCount">0</span> players</div>
  </div>
  <div class="player-grid" id="playerGrid"></div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div></div>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

const PAGE_SIZE = 24;
let filtered = [...PLAYERS];
let currentPage = 1;
let sortKey = 'predicted_value';

function formatValue(v) {
  if (v >= 1e6) return '€' + (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '€' + (v/1e3).toFixed(0) + 'K';
  return '€' + v;
}

function posTagClass(pos) { return 'tag pos-' + pos; }
function riskTagClass(r)  { return 'tag risk-' + r; }
function sentTagClass(s)  { return 'tag sentiment-' + s; }

function renderCards() {
  const grid = document.getElementById('playerGrid');
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('showCount').textContent = filtered.length.toLocaleString();

  if (!page.length) {
    grid.innerHTML = '<div class="no-results"><h3>No players found</h3><p>Try adjusting your filters</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  grid.innerHTML = page.map((p,i) => `
    <div class="player-card" onclick="openModal(${PLAYERS.indexOf(p)})" style="animation-delay:${i*0.02}s">
      <div class="card-top">
        <div>
          <div class="card-name">${p.name}</div>
          <div class="card-club">${p.club} · ${p.nationality}</div>
        </div>
        <div class="card-ova">${p.ova}</div>
      </div>
      <div class="card-value"><span class="currency">Predicted</span>${formatValue(p.predicted_value)}</div>
      <div class="card-tags">
        <span class="${posTagClass(p.position_group)}">${p.position}</span>
        <span class="tag stage">${p.career_stage}</span>
        <span class="${riskTagClass(p.injury_risk)}">${p.injury_risk} risk</span>
        <span class="${sentTagClass(p.sentiment_label)}">${p.sentiment_label}</span>
      </div>
    </div>
  `).join('');

  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML=''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Prev</button>`;

  let start = Math.max(1, currentPage-2);
  let end   = Math.min(total, start+4);
  if (end-start < 4) start = Math.max(1, end-4);

  if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>${start>2?'<span class="page-info">…</span>':''}`;
  for (let i=start; i<=end; i++)
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if (end < total) html += `${end<total-1?'<span class="page-info">…</span>':''}<button class="page-btn" onclick="goPage(${total})">${total}</button>`;

  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>Next →</button>`;
  html += `<span class="page-info">Page ${currentPage} of ${total}</span>`;
  pg.innerHTML = html;
}

function goPage(n) {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  currentPage = Math.max(1, Math.min(n, total));
  renderCards();
  window.scrollTo({top:0, behavior:'smooth'});
}

function applyFilters() {
  const q    = document.getElementById('searchInput').value.toLowerCase().trim();
  const pos  = document.getElementById('posFilter').value;
  const stage= document.getElementById('stageFilter').value;
  const risk = document.getElementById('riskFilter').value;
  const sent = document.getElementById('sentimentFilter').value;

  filtered = PLAYERS.filter(p =>
    (!q    || p.name.toLowerCase().includes(q) || p.club.toLowerCase().includes(q) || p.nationality.toLowerCase().includes(q)) &&
    (!pos  || p.position_group === pos) &&
    (!stage|| p.career_stage === stage) &&
    (!risk || p.injury_risk === risk) &&
    (!sent || p.sentiment_label === sent)
  );

  filtered.sort((a,b) => b[sortKey] - a[sortKey]);
  currentPage = 1;
  renderCards();
}

function setSort(key, el) {
  sortKey = key;
  document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('posFilter').value = '';
  document.getElementById('stageFilter').value = '';
  document.getElementById('riskFilter').value = '';
  document.getElementById('sentimentFilter').value = '';
  applyFilters();
}

function openModal(idx) {
  const p = PLAYERS[idx];
  const perfPct = Math.round((p.performance_score / 100) * 100);
  const potPct  = Math.round((p.potential_score / 100) * 100);
  const sentPct = Math.round(((p.sentiment + 1) / 2) * 100);
  const ovaPct  = Math.round((p.ova / 100) * 100);
  const diff    = p.predicted_value - p.actual_value;
  const diffStr = diff >= 0
    ? `<span style="color:var(--green)">+${formatValue(Math.abs(diff))} over actual</span>`
    : `<span style="color:var(--red)">${formatValue(Math.abs(diff))} under actual</span>`;

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-name">${p.name}</div>
    <div class="modal-meta">${p.club} · ${p.nationality} · Age ${p.age} · ${p.position}</div>
    <div class="modal-value-section">
      <div class="modal-pred-label">AI Predicted Transfer Value</div>
      <div class="modal-pred-val">${formatValue(p.predicted_value)}</div>
      <div class="modal-actual">Actual market value: ${formatValue(p.actual_value)} &nbsp;·&nbsp; ${diffStr}</div>
    </div>
    <div class="modal-grid">
      <div class="modal-stat">
        <div class="modal-stat-lbl">OVA Rating</div>
        <div class="modal-stat-val">${p.ova} <span style="font-size:13px;color:var(--muted)">/100</span></div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-lbl">Career Stage</div>
        <div class="modal-stat-val" style="font-size:15px;text-transform:capitalize">${p.career_stage}</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-lbl">Injury Risk</div>
        <div class="modal-stat-val" style="font-size:15px;text-transform:capitalize;color:${p.injury_risk==='high'?'var(--red)':p.injury_risk==='medium'?'var(--gold)':p.injury_risk==='low'?'var(--accent2)':'var(--green)'}">${p.injury_risk}</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-lbl">Contract Years</div>
        <div class="modal-stat-val">${p.contract_years > 0 ? p.contract_years + ' yrs' : 'N/A'}</div>
      </div>
    </div>
    <div class="bar-section">
      <div class="bar-row">
        <span class="bar-lbl">OVA Rating</span>
        <div class="bar-track"><div class="bar-fill" style="width:${ovaPct}%;background:var(--accent)"></div></div>
        <span class="bar-val">${p.ova}</span>
      </div>
      <div class="bar-row">
        <span class="bar-lbl">Performance</span>
        <div class="bar-track"><div class="bar-fill" style="width:${perfPct}%;background:var(--gold)"></div></div>
        <span class="bar-val">${p.performance_score.toFixed(0)}</span>
      </div>
      <div class="bar-row">
        <span class="bar-lbl">Potential</span>
        <div class="bar-track"><div class="bar-fill" style="width:${potPct}%;background:var(--green)"></div></div>
        <span class="bar-val">${p.potential_score.toFixed(0)}</span>
      </div>
      <div class="bar-row">
        <span class="bar-lbl">Sentiment</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.max(0,sentPct)}%;background:${p.sentiment_label==='positive'?'var(--green)':p.sentiment_label==='negative'?'var(--red)':'var(--muted)'}"></div></div>
        <span class="bar-val">${p.sentiment.toFixed(2)}</span>
      </div>
    </div>
    <div class="card-tags">
      <span class="${posTagClass(p.position_group)}">${p.position} · ${p.position_group}</span>
      <span class="${sentTagClass(p.sentiment_label)}">${p.sentiment_label} sentiment</span>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModalBtn(); });

// Search on Enter
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') applyFilters();
});

// Init
applyFilters();
</script>
