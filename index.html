<!DOCTYPE html>
<html>

<head>

<title>AI Transfer IQ</title>

<style>

body{
font-family: 'Segoe UI',sans-serif;
background: linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{

background: rgba(255,255,255,0.1);
backdrop-filter: blur(15px);

padding:40px;

width:420px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,0.3);

text-align:center;

color:white;

}

h1{

margin-bottom:5px;

}

.subtitle{

opacity:0.8;

margin-bottom:25px;

}

input{

width:85%;

padding:12px;

margin:12px;

border:none;

border-radius:8px;

font-size:16px;

}

input:focus{

outline:none;

transform:scale(1.03);

}

button{

background:#00c853;

color:white;

border:none;

padding:12px 30px;

font-size:16px;

border-radius:8px;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#00e676;

transform:scale(1.05);

}

.result{

margin-top:25px;

font-size:20px;

font-weight:bold;

color:#ffd54f;

}

.footer{

margin-top:20px;

font-size:13px;

opacity:0.7;

}

</style>

</head>

<body>

<div class="container">

<h1>⚽ AI Transfer IQ</h1>

<p class="subtitle">Football Transfer Value Predictor</p>

<form action="/predict" method="post">

<input type="number" name="age" placeholder="Enter Player Age" required>

<input type="number" name="ova" placeholder="Enter Overall Rating" required>

<br>

<button type="submit">Predict Value</button>

</form>

<div class="result">

{{prediction_text}}

</div>

<div class="footer">

AI Powered Football Analytics | ML Project

</div>

</div>

</body>

</html>
